        on the dataset page: https://huggingface.co/datasets/Anthropic/hh-rlhf.\",\"downloads\":37374,\"tags\":[\"license:mit\",\"size_categories:100K<n<1M\",\"format:json\",\"modality:text\",\"library:datasets\",\"library:dask\",\"library:mlcroissant\",\"library:polars\",\"arxiv:2204.05862\",\"region:us\",\"human-feedback\"],\"createdAt\":\"2022-12-08T20:11:33.000Z\",\"key\":\"\"},{\"_id\":\"648b556b363cf923caddc497\",\"id\":\"Open-Orca/OpenOrca\",\"author\":\"Open-Orca\",\"disabled\":false,\"gated\":false,\"lastModified\":\"2025-02-19T07:32:36.000Z\",\"likes\":1460,\"private\":false,\"sha\":\"e9c87b4abb2609913751f9b26553fdb9c061796c\",\"description\":\"\U0001F40B
        The OpenOrca Dataset! \U0001F40B\\n\\n\\n\\nWe are thrilled to announce the
        release of the OpenOrca dataset!\\nThis rich collection of augmented FLAN
        data aligns, as best as possible, with the distributions outlined in the Orca
        paper.\\nIt has been instrumental in generating high-performing model checkpoints
        and serves as a valuable resource for all NLP researchers and developers!\\n\\n\\t\\n\\t\\t\\n\\t\\n\\t\\n\\t\\tOfficial
        Models\\n\\t\\n\\n\\n\\t\\n\\t\\n\\t\\n\\t\\tMistral-7B-OpenOrca\\n\\t\\n\\nOur
        latest model, the first 7B to score better overall than all\u2026 See the
