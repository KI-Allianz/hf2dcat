      string: "[{\"_id\":\"63990f21cc50af73d29ecfa3\",\"id\":\"fka/awesome-chatgpt-prompts\",\"author\":\"fka\",\"disabled\":false,\"gated\":false,\"lastModified\":\"2025-01-06T00:02:53.000Z\",\"likes\":9390,\"private\":false,\"sha\":\"68ba7694e23014788dcc8ab5afe613824f45a05c\",\"description\":\"\U0001F9E0
        Awesome ChatGPT Prompts [CSV dataset]\\n\\nThis is a Dataset Repository of
        Awesome ChatGPT Prompts\\nView All Prompts on GitHub\\n\\n\\t\\n\\t\\t\\n\\t\\tLicense\\n\\t\\n\\nCC-0\\n\",\"downloads\":39837,\"tags\":[\"task_categories:question-answering\",\"license:cc0-1.0\",\"size_categories:n<1K\",\"format:csv\",\"modality:text\",\"library:datasets\",\"library:pandas\",\"library:mlcroissant\",\"library:polars\",\"region:us\",\"ChatGPT\"],\"createdAt\":\"2022-12-13T23:47:45.000Z\",\"key\":\"\"},{\"_id\":\"66212f29fb07c3e05ad0432e\",\"id\":\"HuggingFaceFW/fineweb\",\"author\":\"HuggingFaceFW\",\"disabled\":false,\"gated\":false,\"lastModified\":\"2025-07-11T20:16:53.000Z\",\"likes\":2440,\"private\":false,\"sha\":\"9bb295ddab0e05d785b879661af7260fed5140fc\",\"description\":\"\\n\\t\\n\\t\\t\\n\\t\\t\U0001F377
        FineWeb\\n\\t\\n\\n\\n    \\n\\n\\n\\n15 trillion tokens of the finest data
        the \U0001F310 web has to offer\\n\\n\\n\\t\\n\\t\\t\\n\\t\\tWhat is it?\\n\\t\\n\\nThe
        \U0001F377 FineWeb dataset consists of more than 18.5T tokens (originally
        15T tokens) of cleaned and deduplicated english web data from CommonCrawl.
        The data processing pipeline is optimized for LLM performance and ran on the
        \U0001F3ED datatrove library, our large scale data processing library. \\n\U0001F377
        FineWeb was originally meant to be a fully open replication of \U0001F985
        RefinedWeb, with a release\u2026 See the full description on the dataset page:
        https://huggingface.co/datasets/HuggingFaceFW/fineweb.\",\"downloads\":282463,\"tags\":[\"task_categories:text-generation\",\"language:en\",\"license:odc-by\",\"size_categories:10B<n<100B\",\"modality:tabular\",\"modality:text\",\"arxiv:2306.01116\",\"arxiv:2109.07445\",\"arxiv:2406.17557\",\"doi:10.57967/hf/2493\",\"region:us\"],\"createdAt\":\"2024-04-18T14:33:13.000Z\",\"key\":\"\"},{\"_id\":\"639244f571c51c43091df168\",\"id\":\"Anthropic/hh-rlhf\",\"author\":\"Anthropic\",\"disabled\":false,\"gated\":false,\"lastModified\":\"2023-05-26T18:47:34.000Z\",\"likes\":1481,\"private\":false,\"sha\":\"09be8c5bbc57cb3887f3a9732ad6aa7ec602a1fa\",\"description\":\"\\n\\t\\n\\t\\t\\n\\t\\tDataset
        Card for HH-RLHF\\n\\t\\n\\n\\n\\t\\n\\t\\t\\n\\t\\tDataset Summary\\n\\t\\n\\nThis
        repository provides access to two different kinds of data:\\n\\nHuman preference
        data about helpfulness and harmlessness from Training a Helpful and Harmless
        Assistant with Reinforcement Learning from Human Feedback. These data are
        meant to train preference (or reward) models for subsequent RLHF training.
        These data are not meant for supervised training of dialogue agents. Training
